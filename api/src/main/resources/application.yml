spring:
  profiles:
    active: local

---

spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:mysql://localhost:3306/mini_auth?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true

  security:
    oauth2:
      client:

        registration:

          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder-secret}

            scope:
              - email
              - profile

            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

          facebook:
            client-id: ${FACEBOOK_CLIENT_ID:placeholder-id}
            client-secret: ${FACEBOOK_CLIENT_SECRET:placeholder-secret}

            scope:
              - email
              - public_profile

            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"

        provider:

          facebook:
            authorization-uri: https://www.facebook.com/v18.0/dialog/oauth

            token-uri: https://graph.facebook.com/v18.0/oauth/access_token

            user-info-uri: https://graph.facebook.com/me?fields=id,name,email

            user-name-attribute: id

server:
  port: 8080

app:

  frontend-url: http://localhost:5173

  jwt:
    secret: mySuperSecretKey123456mySuperSecretKey123456
    access-token-expiration-ms: 900000
    refresh-token-expiration-ms: 604800000